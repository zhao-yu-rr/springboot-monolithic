databaseChangeLog:
  # ============================================================
  # 数据初始化汇总：包含所有 INSERT 操作
  # ============================================================

  # ============================================================
  # 一、初始化角色与超级管理员用户
  # ============================================================

  # --- 1.1 初始化默认角色 ---
  - changeSet:
      id: v007-insert-default-roles
      author: scaffold
      comment: 初始化默认角色数据（ADMIN、USER）
      changes:
        - insert:
            tableName: sys_role
            columns:
              - column:
                  name: role_code
                  value: ADMIN
              - column:
                  name: role_name
                  value: 管理员
              - column:
                  name: description
                  value: 系统管理员，拥有所有权限
              - column:
                  name: status
                  valueNumeric: 1
              - column:
                  name: deleted
                  valueNumeric: 0
        - insert:
            tableName: sys_role
            columns:
              - column:
                  name: role_code
                  value: USER
              - column:
                  name: role_name
                  value: 普通用户
              - column:
                  name: description
                  value: 系统普通用户，拥有基本权限
              - column:
                  name: status
                  valueNumeric: 1
              - column:
                  name: deleted
                  valueNumeric: 0

  # --- 1.2 初始化超级管理员用户 ---
  - changeSet:
      id: v007-insert-admin-user
      author: scaffold
      comment: 初始化超级管理员用户（admin / admin123）
      changes:
        - insert:
            tableName: sys_user
            columns:
              - column:
                  name: username
                  value: admin
              - column:
                  name: password
                  value: $2a$10$bnp0pJJ8TdUNyKm9B226PO6iemLjIv33UwnUs0qvj61Tx76a1DVIW
              - column:
                  name: nickname
                  value: 超级管理员
              - column:
                  name: status
                  valueNumeric: 1
              - column:
                  name: deleted
                  valueNumeric: 0

  # --- 1.3 为超级管理员分配 ADMIN 角色 ---
  - changeSet:
      id: v007-assign-admin-role
      author: scaffold
      comment: 为超级管理员分配ADMIN角色
      changes:
        - insert:
            tableName: sys_user_role
            columns:
              - column:
                  name: user_id
                  valueNumeric: 1
              - column:
                  name: role_id
                  valueNumeric: 1

