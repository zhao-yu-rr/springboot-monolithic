server:
  port: 8080

spring:
  application:
    name: springboot-monolithic

  # Liquibase 配置
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: default

  # MySQL 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/scaffold?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: ScaffoldHikariCP

  # Redis 配置（Redisson连接）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: Scaff0ldSecr3tK3y2026SpringB00tM0n0lithicApplicati0nJwtT0ken
  expiration: 86400000  # 24小时（毫秒）
  header: Authorization
  prefix: "Bearer "

# 用户注册默认角色配置
user:
  register:
    default-role-code: USER  # 注册时自动分配的默认角色编码
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# RustFS 对象存储配置（兼容 S3 协议）
rustfs:
  endpoint: http://rustfs.example.com
  access-key: rustfsadmin
  secret-key: rustfsadmin
  bucket-name: ${spring.application.name}
  domain: http://rustfs.example.com
  preview-domain: http://rustfs.example.com

# 日志配置
logging:
  level:
    root: INFO
    com.example.springbootmonolithic: DEBUG
    com.baomidou.mybatisplus: DEBUG
  file:
    name: logs/scaffold.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 500MB
